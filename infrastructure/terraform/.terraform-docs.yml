formatter: "markdown table"

header-from: main.tf
footer-from: ""

sections:
  show:
    - header
    - requirements
    - providers
    - modules
    - resources
    - inputs
    - outputs

content: |-
  {{ .Header }}
  
  ## Architecture
  
  This Terraform configuration deploys a complete full-stack application infrastructure on AWS with:
  
  - **Networking**: VPC with public/private subnets across multiple AZs
  - **Compute**: ECS on EC2 with auto-scaling
  - **Load Balancing**: Application Load Balancer with HTTPS
  - **Database**: RDS PostgreSQL with automatic backups
  - **Storage**: ECR for container images
  - **DNS**: Route53 with automatic certificate validation
  - **Monitoring**: CloudWatch logs and optional alarms
  - **Security**: Security groups, IAM roles, encrypted storage
  
  {{ .Requirements }}
  
  {{ .Providers }}
  
  {{ .Modules }}
  
  {{ .Resources }}
  
  {{ .Inputs }}
  
  {{ .Outputs }}

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
