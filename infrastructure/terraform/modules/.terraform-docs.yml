formatter: "markdown table"

header-from: main.tf
footer-from: ""

sections:
  show:
    - header
    - requirements
    - providers
    - modules
    - resources
    - inputs
    - outputs

content: |-
  {{ .Header }}

  ## What This Module Adds

  This wrapper module provides organization-wide standards:

  - **Naming convention**: `{project}-{environment}-{resource_name}`
  - **Standard tagging**: Merges project, environment, and component tags
  - **Environment-based defaults**: Configures resources based on environment (production vs staging)

  ## Usage

  ```hcl
  module "example" {
    source = "./modules/MODULE_NAME"

    context = local.context

    # Module-specific variables
  }
  ```

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

output:
  file: "README.md"
  mode: replace

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
