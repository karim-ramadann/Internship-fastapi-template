name: Deploy Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "AWS Environment to deploy"
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev
        required: true

env:
  AWS_ROLE_ARN: "arn:aws:iam::178306612148:role/GH-Deploy-Terraform-Role"
  AWS_REGION: "eu-west-1"
  TF_WORKING_DIR: "infrastructure/terraform/runtime"
  TF_ENVIRONMENT: ${{ inputs.environment }}

jobs:
  plan:
    name: "Terraform Plan (${{ inputs.environment }})"
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.14.4

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config="environments/$TF_ENVIRONMENT/backend.hcl"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="environments/$TF_ENVIRONMENT/terraform.tfvars" \
            -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  apply:
    name: "Terraform Apply (${{ inputs.environment }})"
    runs-on: ubuntu-24.04
    needs: plan
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.14.4

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config="environments/$TF_ENVIRONMENT/backend.hcl"

      - name: Download Plan Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Manual Approval for Production
        if: inputs.environment == 'production'
        uses: trstringer/manual-approval@74d99dff7380e3e4b122d4ededcbca2b6ce59367
        timeout-minutes: 15
        with:
          secret: ${{ github.token }}
          approvers: taha-digico
          minimum-approvals: 1
          issue-title: "Deploying Terraform to ${{ inputs.environment }}"
          issue-body: "Please approve or deny the Terraform deployment of main branch to ${{ inputs.environment }}"
          exclude-workflow-initiator-as-approver: false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
