name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "AWS Environment to plan"
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev
        required: true
      image_tag:
        description: "Backend Docker image tag to plan (e.g. dev-abc1234)"
        type: string
        required: true

env:
  TF_WORKING_DIR: "infrastructure/terraform/runtime"
  TF_ENVIRONMENT: ${{ inputs.environment }}
  TF_VERSION: "1.14.4"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  plan:
    name: "Terraform Plan (${{ inputs.environment }})"
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    steps:
      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-plan
        with:
          environment: ${{ inputs.environment }}
          image_tag: ${{ inputs.image_tag }}
          terraform_version: ${{ env.TF_VERSION }}
