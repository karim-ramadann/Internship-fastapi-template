name: "Terraform Plan"
description: "Run Terraform plan and upload the plan artifact"

inputs:
  environment:
    description: "AWS environment to plan against (dev, staging, production)"
    required: true
  image_tag:
    description: "Backend Docker image tag to deploy (e.g. dev-abc1234)"
    required: true
  terraform_version:
    description: "Terraform version to use"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ env.TF_WORKING_DIR }}
      env:
        TF_ENVIRONMENT: ${{ inputs.environment }}
      run: terraform init -backend-config="environments/$TF_ENVIRONMENT/backend.hcl"

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform validate

    - name: Terraform Plan
      shell: bash
      working-directory: ${{ env.TF_WORKING_DIR }}
      env:
        TF_ENVIRONMENT: ${{ inputs.environment }}
        IMAGE_TAG: ${{ inputs.image_tag }}
      run: |
        terraform plan \
          -var-file="environments/$TF_ENVIRONMENT/terraform.tfvars" \
          -var="backend_image_tag=$IMAGE_TAG" \
          -out=tfplan

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-${{ inputs.environment }}
        path: ${{ env.TF_WORKING_DIR }}/tfplan
        retention-days: 1
