Outputs:
  ECRBackendRepositoryUri:
    Description: ECR repository URI for backend
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackendRepository}'
    Export:
      Name: !Sub '${EnvironmentName}-ECRBackendRepositoryUri'

  ECRFrontendRepositoryUri:
    Description: ECR repository URI for frontend
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${FrontendRepository}'
    Export:
      Name: !Sub '${EnvironmentName}-ECRFrontendRepositoryUri'

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${EnvironmentName}-ECSClusterName'

  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-ALBDnsName'

  ALBArn:
    Description: ARN of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
    Export:
      Name: !Sub '${EnvironmentName}-ALBArn'

  BackendServiceName:
    Description: Backend ECS service name
    Value: !Ref BackendService
    Export:
      Name: !Sub '${EnvironmentName}-BackendServiceName'

  FrontendServiceName:
    Description: Frontend ECS service name
    Value: !Ref FrontendService
    Export:
      Name: !Sub '${EnvironmentName}-FrontendServiceName'
