AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stack 4: Compute Infrastructure - ECR, ECS Fargate cluster, ALB, task definitions, and services'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment identifier (e.g., aipos-dev, aipos-staging, aipos-prod)
    AllowedPattern: ^[a-z0-9-]+$
    MinLength: 3
    MaxLength: 50

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from Network stack
    # TODO: Use ImportValue to get from Network stack output

  PublicSubnetIds:
    Type: CommaDelimitedList
    Description: List of public subnet IDs from Network stack
    # TODO: Use ImportValue to get from Network stack output

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: List of private subnet IDs from Network stack
    # TODO: Use ImportValue to get from Network stack output

  ALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID for ALB from Network stack
    # TODO: Use ImportValue to get from Network stack output

  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID for ECS tasks from Network stack
    # TODO: Use ImportValue to get from Network stack output

  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS (must be in same region)
    Default: ''

  DomainName:
    Type: String
    Description: Domain name for the application
    Default: ''

  BackendImageTag:
    Type: String
    Description: Docker image tag for backend service
    Default: latest

  FrontendImageTag:
    Type: String
    Description: Docker image tag for frontend service
    Default: latest

  BackendCpu:
    Type: String
    Description: CPU units for backend task (256, 512, 1024, etc.)
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048', '4096']

  BackendMemory:
    Type: String
    Description: Memory for backend task in MB
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '4096', '8192']

  FrontendCpu:
    Type: String
    Description: CPU units for frontend task (256, 512, 1024, etc.)
    Default: '256'
    AllowedValues: ['256', '512', '1024', '2048']

  FrontendMemory:
    Type: String
    Description: Memory for frontend task in MB
    Default: '512'
    AllowedValues: ['512', '1024', '2048', '4096']

  DesiredCount:
    Type: Number
    Description: Desired number of tasks for each service
    Default: 2
    MinValue: 1
    MaxValue: 10

  MinCapacity:
    Type: Number
    Description: Minimum number of tasks for auto-scaling
    Default: 2
    MinValue: 1

  MaxCapacity:
    Type: Number
    Description: Maximum number of tasks for auto-scaling
    Default: 10
    MinValue: 1

